name: Release
on:
  workflow_dispatch:
    inputs:
      html_url:
        description: >
          Direct download URL for Confluence HTML export (.zip).
          For box.mikrotik.com Seafile links, append &dl=1 to get the actual file.
        required: true
        type: string
        default: 'https://box.mikrotik.com/d/df76f0d495284eb1b6a1/files/?p=%2FConfluence-space-export-112800-380.html.zip&dl=1'
      version:
        description: 'Optional release version override (e.g. v0.2.0). Default: v + package.json version.'
        required: false
        type: string
        default: ''
      docs_date:
        description: 'Export date or presumed RouterOS version for traceability (e.g. 2026-03-25)'
        required: false
        type: string
        default: '2026-03-25'
      full_versions:
        description: 'Extract all RouterOS versions (true) or single primary only (false)'
        required: false
        type: boolean
        default: true
      republish_assets:
        description: >
          Reupload GitHub Release assets and OCI tags for an existing version.
          Does NOT re-publish npm; bump package.json version for a new npm package.
        required: false
        type: boolean
        default: false

concurrency:
  group: release
  cancel-in-progress: false

permissions:
  contents: write
  packages: write

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.release_version.outputs.version }}
    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          registry-url: https://registry.npmjs.org

      - run: bun install

      # ── Fast-fail quality gate ──
      # Run before the ~2-minute extraction pipeline so a typecheck/lint
      # regression that slipped past test.yml fails in ~30s, not ~3min.
      # DB-touching tests re-run after extraction (the test step below stays).

      - name: Type check (fast-fail)
        run: bun run typecheck

      - name: Lint (fast-fail)
        run: bun run lint

      - name: Run tests (fast-fail)
        run: bun test

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # ── Download and validate HTML export ──

      - name: Download HTML export
        run: |
          echo "Downloading: ${{ inputs.html_url }}"
          curl -fSL --max-time 600 -o export.zip "${{ inputs.html_url }}"
          # Validate zip magic bytes (PK = 0x504b)
          MAGIC=$(xxd -l 2 -p export.zip)
          if [ "$MAGIC" != "504b" ]; then
            echo "::error::Downloaded file is not a valid ZIP archive (magic: $MAGIC)"
            if echo "${{ inputs.html_url }}" | grep -q "box.mikrotik.com"; then
              echo "::error::Hint: Seafile share links need &dl=1 appended for direct download"
            fi
            exit 1
          fi
          SIZE=$(du -h export.zip | cut -f1)
          echo "✓ Downloaded ZIP ($SIZE)"

      - name: Extract HTML and locate ROS directory
        id: locate
        run: |
          # Confluence exports include a bare "/" root entry which causes unzip
          # to warn ("stripped absolute path spec") and exit with code 2.
          # The files extract fine — tolerate exit codes 0 and 2.
          unzip -q export.zip -d html-export || [ $? -eq 2 ]
          # Find the ROS directory containing Confluence HTML files
          ROS_DIR=$(find html-export -type d -name "ROS" | head -1)
          if [ -z "$ROS_DIR" ]; then
            # Fallback: find any directory with many .html files
            ROS_DIR=$(find html-export -name "*.html" -type f | head -1 | xargs dirname)
          fi
          if [ -z "$ROS_DIR" ] || [ ! -d "$ROS_DIR" ]; then
            echo "::error::Could not find HTML directory in ZIP archive"
            exit 1
          fi
          HTML_COUNT=$(find "$ROS_DIR" -maxdepth 1 -name "*.html" -type f | wc -l)
          echo "✓ Found $HTML_COUNT HTML files in $ROS_DIR"
          if [ "$HTML_COUNT" -lt 50 ]; then
            echo "::warning::Expected ~317 HTML files but found only $HTML_COUNT"
          fi
          echo "ros_dir=$ROS_DIR" >> "$GITHUB_OUTPUT"

      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail
          INPUT_VERSION="${{ inputs.version }}"
          if [ -n "$INPUT_VERSION" ]; then
            VERSION="$INPUT_VERSION"
            SOURCE="workflow input"
          else
            PKG_VERSION=$(node -p "require('./package.json').version")
            VERSION="v${PKG_VERSION}"
            SOURCE="package.json"
          fi
          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "source=$SOURCE" >> "$GITHUB_OUTPUT"
          echo "✓ Release version: $VERSION (from $SOURCE)"

      # ── Extraction pipeline ──

      - name: Extract HTML pages
        run: bun run src/extract-html.ts "${{ steps.locate.outputs.ros_dir }}"

      - name: Extract properties
        run: bun run src/extract-properties.ts "${{ steps.locate.outputs.ros_dir }}"

      - name: Extract command tree
        run: |
          if [ "${{ inputs.full_versions }}" = "true" ]; then
            bun run src/extract-all-versions.ts
          else
            bun run src/extract-commands.ts
          fi

      - name: Extract devices
        run: bun run src/extract-devices.ts

      - name: Extract test results
        run: bun run src/extract-test-results.ts

      - name: Extract changelogs
        run: bun run src/extract-changelogs.ts

      - name: Import video transcripts from cache
        run: make extract-videos-from-cache

      - name: Import Dude wiki docs from cache
        run: make extract-dude-from-cache

      - name: Extract agent skills from GitHub
        run: bun run src/extract-skills.ts

      - name: Link commands to pages
        run: bun run src/link-commands.ts

      - name: GC schema node presence versions
        run: make gc-versions EXTRA_FLAGS=--verbose

      # ── Post-extraction DB-wipe guard ──
      # query.test.ts hard-fails if the DB singleton isn't :memory:, so
      # running tests after extraction detects any regression of the
      # v0.7.6 "tests wiped the built DB" bug before publish.
      # (Typecheck + lint already ran fast-fail above.)

      - name: Run tests (DB-wipe guard)
        run: bun test

      # Runs in a fresh process so the db.ts singleton opens the real built
      # DB (the main `bun test` above pins it to `:memory:`, which skips
      # Blocks B/C). Non-blocking: Block C asserts shape invariants that
      # should hold on any populated DB, but we don't want a one-off
      # classifier tweak to block a release — flip to blocking once we've
      # observed it green across a few rebuilds.
      - name: MCP contract tests (real DB, non-blocking)
        continue-on-error: true
        run: |
          echo "## MCP contract test (Phase 2, real DB)" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bun test src/mcp-contract.test.ts 2>&1 | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ── MCP retrieval eval (Phase 0, non-blocking) ──
      # Runs the 20-query golden set against the freshly built full DB.
      # Non-blocking on first landing: the committed baseline was captured
      # against a local dev DB, so the first real-DB run will drift. After
      # one successful rebuild, flip `continue-on-error` to false and
      # refresh the baseline as part of that commit. See BACKLOG:
      # "MCP Behavioral Testing — Review findings + follow-ups".

      - name: MCP retrieval eval (Phase 0, non-blocking)
        continue-on-error: true
        run: |
          echo "## Phase 0 retrieval eval" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
          bun run src/eval/retrieval.ts | tee -a "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"

      # ── Build and release ──

      - name: Stamp DB provenance (db_meta)
        run: |
          bun run scripts/stamp-db-meta.ts \
            --release-tag "${{ steps.release_version.outputs.version }}" \
            --source-commit "${{ github.sha }}"

      - name: Collect DB stats
        id: stats
        run: |
          PAGES=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM pages")
          COMMANDS=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM commands WHERE type='cmd'")
          VERSIONS=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM ros_versions")
          DEVICES=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM devices")
          PROPERTIES=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM properties")
          VIDEOS=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM videos" 2>/dev/null || echo 0)
          SEGMENTS=$(sqlite3 ros-help.db "SELECT COUNT(*) FROM video_segments WHERE transcript != ''" 2>/dev/null || echo 0)
          {
            echo "pages=$PAGES"
            echo "commands=$COMMANDS"
            echo "versions=$VERSIONS"
            echo "devices=$DEVICES"
            echo "properties=$PROPERTIES"
            echo "videos=$VIDEOS"
            echo "segments=$SEGMENTS"
          } >> "$GITHUB_OUTPUT"
          echo "✓ DB: $PAGES pages, $COMMANDS commands, $VERSIONS versions, $DEVICES devices, $PROPERTIES properties, $VIDEOS videos ($SEGMENTS transcript segments)"

      # ── Sanity gate: refuse to publish a degenerate DB ──
      # Release v0.7.6 shipped with 3 pages because a test wiped the DB after
      # extract-html. Hard-fail here so a regression of that bug can't ever
      # reach downstream publishing or upload steps.
      - name: Validate DB has expected content
        env:
          PAGES: ${{ steps.stats.outputs.pages }}
          COMMANDS: ${{ steps.stats.outputs.commands }}
          DEVICES: ${{ steps.stats.outputs.devices }}
          PROPERTIES: ${{ steps.stats.outputs.properties }}
        run: |
          set -euo pipefail
          fail=0
          if [ "${PAGES:-0}" -lt 200 ]; then
            echo "::error::DB has only ${PAGES} pages — expected ≥200 (latest export is 317). Aborting release."
            fail=1
          fi
          if [ "${COMMANDS:-0}" -lt 1000 ]; then
            echo "::error::DB has only ${COMMANDS} commands — expected ≥1000. Aborting release."
            fail=1
          fi
          if [ "${DEVICES:-0}" -lt 100 ]; then
            echo "::error::DB has only ${DEVICES} devices — expected ≥100 (current matrix is 144). Aborting release."
            fail=1
          fi
          if [ "${PROPERTIES:-0}" -lt 1000 ]; then
            echo "::error::DB has only ${PROPERTIES} properties — expected ≥1000 (current export is ~4860). Aborting release."
            fail=1
          fi
          if [ "$fail" = "1" ]; then exit 1; fi
          echo "✓ DB content validation passed"

      - name: Build release artifacts
        run: bun run scripts/build-release.ts ${{ steps.release_version.outputs.version }}

      - name: Compute image metadata
        id: image_meta
        run: |
          SHORT_SHA=$(echo "${{ github.sha }}" | cut -c1-12)
          echo "short_sha=$SHORT_SHA" >> "$GITHUB_OUTPUT"

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ammo74
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push OCI images (Docker Hub + GHCR)
        run: |
          set -euo pipefail
          SHORT_SHA="${{ steps.image_meta.outputs.short_sha }}"
          VERSION="${{ steps.release_version.outputs.version }}"

          tags=()
          for registry in ammo74/rosetta ghcr.io/tikoci/rosetta; do
            for tag in "$VERSION" latest "sha-${SHORT_SHA}"; do
              tags+=(--tag "${registry}:${tag}")
            done
          done

          # Inject DB into the build context so it gets baked into the image
          docker buildx build \
            --platform linux/amd64,linux/arm64 \
            --build-arg VERSION="$VERSION" \
            --build-arg REPO_URL=tikoci/rosetta \
            "${tags[@]}" \
            --push \
            -f Dockerfile.release \
            .

      - name: Smoke test published OCI images
        run: |
          set -euo pipefail
          SHA_TAG="sha-${{ steps.image_meta.outputs.short_sha }}"

          smoke_test_container() {
            local image="$1"
            local name="$2"
            local port="$3"

            docker rm -f "$name" >/dev/null 2>&1 || true
            echo "Starting: docker run -d --name $name -p ${port}:8080 $image"
            docker run -d --name "$name" -p "${port}:8080" "$image"

            ok=0
            for i in $(seq 1 20); do
              state=$(docker inspect "$name" --format '{{.State.Status}}' 2>/dev/null || echo gone)
              if [ "$state" = exited ] || [ "$state" = gone ]; then
                echo "Container exited early (state=$state, attempt=$i)"
                break
              fi
              code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${port}/mcp" || true)
              if [ "$code" != 000 ] && [ "$code" != 404 ]; then
                ok=1
                break
              fi
              sleep 1
            done

            if [ "$ok" -ne 1 ]; then
              echo "::group::Diagnostic info for $image"
              docker inspect "$name" --format 'Status={{.State.Status}} Exit={{.State.ExitCode}} Error={{.State.Error}} OOMKilled={{.State.OOMKilled}}' 2>&1 || true
              docker logs "$name" 2>&1 || true
              echo "::endgroup::"
              docker rm -f "$name" >/dev/null 2>&1 || true
              return 1
            fi

            docker rm -f "$name" >/dev/null 2>&1 || true
            echo "✓ $image OK (HTTP $code)"
          }

          port=18080
          for image in "ammo74/rosetta:${SHA_TAG}" "ghcr.io/tikoci/rosetta:${SHA_TAG}"; do
            echo "── Smoke testing $image ──"
            docker pull "$image"
            name="rosetta-smoke-$(echo "$image" | tr '/:.' '-')"
            smoke_test_container "$image" "$name" "$port" || {
              echo "::error::Smoke test failed for $image"
              exit 1
            }
          done

      - name: Upload DB as workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: ros-help-db
          path: ros-help.db
          retention-days: 7

      - name: Create or update GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          VERSION="${{ steps.release_version.outputs.version }}"
          DOCS_DATE="${{ inputs.docs_date }}"
          NOTES="## Database Stats
          - **Pages:** ${{ steps.stats.outputs.pages }}
          - **Commands:** ${{ steps.stats.outputs.commands }}
          - **RouterOS Versions:** ${{ steps.stats.outputs.versions }}
          - **Devices:** ${{ steps.stats.outputs.devices }}
          - **Properties:** ${{ steps.stats.outputs.properties }}
          - **Videos:** ${{ steps.stats.outputs.videos }} (${{ steps.stats.outputs.segments }} transcript segments)

          ## Build Info
          - **Commit:** ${{ github.sha }}
          - **Docs date:** ${DOCS_DATE:-not specified}
          - **Release version source:** ${{ steps.release_version.outputs.source }}
          - **Full version extraction:** ${{ inputs.full_versions }}
          - **Workflow run:** ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"

          if [ "${{ inputs.republish_assets }}" = "true" ]; then
            # Create release if it doesn't exist, then reupload assets with clobber.
            gh release create "$VERSION" --title "$VERSION" --notes "$NOTES" 2>/dev/null || true
            gh release upload "$VERSION" dist/*.zip dist/ros-help.db.gz --clobber
            gh release edit "$VERSION" --notes "$NOTES"
            echo "✓ Release $VERSION updated"
          else
            gh release create "$VERSION" dist/*.zip dist/ros-help.db.gz \
              --title "$VERSION" --notes "$NOTES"
            echo "✓ Release $VERSION created"
          fi

      # npm is immutable — you cannot republish the same version with different
      # contents. `republish_assets: true` re-clobbers GH release assets and OCI
      # tags, but trying to re-push npm would always 403. Skip npm in that mode.
      - name: Publish to npm
        if: inputs.republish_assets != true
        run: npm publish --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}

      - name: Skip npm publish (republish_assets mode)
        if: inputs.republish_assets == true
        run: echo "republish_assets=true → skipping npm publish (npm versions are immutable; bump package.json for a new npm package)"

  # End-to-end bunx smoke — replicates exactly what users hit:
  # fresh runner → bunx pulls the just-published @tikoci/rosetta → --refresh
  # downloads the DB and opens it. Matrix covers macOS + Linux because the
  # v0.8.0 "DB=unreadable" bug only fires on macOS (WAL-mode SQLite + readonly
  # open with no .shm). Linux-only CI greenlit that release.
  #
  # Failure here fails the overall workflow (red X, notifications) but does
  # NOT gate bump-version — see comment on bump-version for the reasoning.
  bunx-smoke:
    needs: build-and-release
    if: inputs.republish_assets != true  # republish_assets skips npm publish, so nothing to smoke
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Wait for npm registry to propagate @tikoci/rosetta@${{ needs.build-and-release.outputs.version }}
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
        run: |
          set -euo pipefail
          # Strip leading v — npm versions are unprefixed.
          NPM_VER="${VERSION#v}"
          echo "Waiting for @tikoci/rosetta@${NPM_VER} on npm registry..."
          for _ in {1..30}; do
            if npm view "@tikoci/rosetta@${NPM_VER}" version >/dev/null 2>&1; then
              echo "✓ npm registry has ${NPM_VER} (attempt $i)"
              exit 0
            fi
            sleep 5
          done
          echo "::error::npm registry did not surface @tikoci/rosetta@${NPM_VER} within 150s"
          exit 1

      - name: bunx --refresh exits 0 (DB downloads + opens cleanly)
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
        run: |
          set -euo pipefail
          NPM_VER="${VERSION#v}"
          # Pin to the exact version so a stale `latest` tag can't mask a broken build.
          echo "── bunx @tikoci/rosetta@${NPM_VER} --refresh ──"
          bunx "@tikoci/rosetta@${NPM_VER}" --refresh
          # DB should now exist and be readable from a second invocation
          # (this is where the v0.8.0 readonly-probe bug would reappear).
          echo "── bunx @tikoci/rosetta@${NPM_VER} --version ──"
          OUT=$(bunx "@tikoci/rosetta@${NPM_VER}" --version)
          echo "$OUT"
          echo "$OUT" | grep -F "${NPM_VER}" > /dev/null

      - name: MCP server starts and DB probe succeeds
        env:
          VERSION: ${{ needs.build-and-release.outputs.version }}
        shell: bash
        run: |
          set -euo pipefail
          NPM_VER="${VERSION#v}"
          # Spawn the HTTP server, wait for /mcp to answer, shut down.
          # If ensureDbReady's probe regresses (e.g. readonly-on-WAL), the
          # server exits with "Still incompatible after re-download" and /mcp
          # never responds.
          PORT=18765
          LOG=$(mktemp)
          bunx "@tikoci/rosetta@${NPM_VER}" --http --port "$PORT" --host 127.0.0.1 > "$LOG" 2>&1 &
          PID=$!
          trap 'kill "$PID" 2>/dev/null || true' EXIT

          ok=0
          for _ in {1..30}; do
            if ! kill -0 "$PID" 2>/dev/null; then
              echo "::error::Server exited early"
              cat "$LOG"
              exit 1
            fi
            code=$(curl -s -o /dev/null -w '%{http_code}' "http://127.0.0.1:${PORT}/mcp" || true)
            if [ "$code" != 000 ] && [ "$code" != 404 ]; then
              ok=1
              break
            fi
            sleep 1
          done

          if [ "$ok" -ne 1 ]; then
            echo "::error::MCP server never answered on /mcp"
            cat "$LOG"
            exit 1
          fi
          echo "✓ MCP server answered (HTTP $code)"
          echo "── server log (first 40 lines) ──"
          head -40 "$LOG"

  # Always bump after a successful npm publish, even if bunx-smoke fails.
  #
  # Rationale: npm versions are immutable. If bunx-smoke exposes a bug in the
  # just-published version, the fix ships as the NEXT version — we can't
  # republish the broken one. Auto-bumping here means the fix-up release
  # starts from a clean version number with no manual intervention needed.
  #
  # If npm publish itself fails (e.g. network, auth), build-and-release fails
  # and this job is skipped via `needs:`. If republish_assets=true was used,
  # npm wasn't touched at all, so keep the existing version.
  bump-version:
    needs: build-and-release
    if: inputs.republish_assets != true
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Bump patch version and promote CHANGELOG for next release
        env:
          RELEASE_VERSION: ${{ needs.build-and-release.outputs.version }}
        run: |
          set -euo pipefail
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Strip leading 'v' for CHANGELOG heading (e.g. "v0.8.5" → "0.8.5")
          RELEASE_VER_NUM="${RELEASE_VERSION#v}"
          RELEASE_DATE=$(date -u +%Y-%m-%d)

          # Rebase-retry loop: back-to-back release runs can race because each
          # checkout pins the SHA at workflow start. Both package.json and
          # CHANGELOG.md are idempotent here, so a rebase is always safe.
          for attempt in 1 2 3; do
            git fetch origin main
            git rebase origin/main || { git rebase --abort; exit 1; }

            CURRENT=$(node -p "require('./package.json').version")
            IFS='.' read -r MAJOR MINOR PATCH <<< "$CURRENT"
            NEXT="$MAJOR.$MINOR.$((PATCH + 1))"
            node -e "const fs=require('fs'); const p=JSON.parse(fs.readFileSync('package.json','utf8')); p.version='$NEXT'; fs.writeFileSync('package.json',JSON.stringify(p,null,2)+'\n')"
            echo "✓ (attempt $attempt) Bumped version: $CURRENT → $NEXT"

            # Promote [Unreleased] → [VERSION] — DATE and prepend a fresh
            # [Unreleased] skeleton so agents can write the next batch of
            # changes to the matching version heading without manual fixups.
            RELEASE_VER_NUM="$RELEASE_VER_NUM" RELEASE_DATE="$RELEASE_DATE" node -e '
              const fs = require("fs");
              const v = process.env.RELEASE_VER_NUM;
              const d = process.env.RELEASE_DATE;
              if (!v || !d) { console.error("RELEASE_VER_NUM or RELEASE_DATE not set"); process.exit(1); }
              let c = fs.readFileSync("CHANGELOG.md", "utf8");
              const unreleased = "## [Unreleased]";
              if (c.includes(unreleased)) {
                const versioned = "## [" + v + "] \u2014 " + d;
                c = c.replace(unreleased, versioned);
                c = c.replace(versioned, unreleased + "\n\n" + versioned);
                fs.writeFileSync("CHANGELOG.md", c);
                console.log("\u2713 Promoted [Unreleased] \u2192 [" + v + "] \u2014 " + d);
              } else {
                console.log("! [Unreleased] not found \u2014 already promoted or CHANGELOG out of sync");
              }
            '

            git add package.json CHANGELOG.md
            # If another bump already landed at our target version, the working
            # tree is clean after rebase; skip the commit.
            if git diff --cached --quiet; then
              echo "✓ package.json already at expected version; nothing to commit"
              exit 0
            fi
            git commit -m "chore: bump to v$NEXT and promote CHANGELOG for next release [skip ci]"

            if git push origin HEAD:main; then
              echo "✓ (attempt $attempt) Version bump pushed"
              exit 0
            fi
            echo "Push rejected on attempt $attempt; rewinding commit and retrying"
            git reset --hard HEAD~1
          done
          echo "::error::Failed to push version bump after 3 attempts"
          exit 1
